services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: student_portal
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://portal:portal@db:5432/student_portal?schema=public
      JWT_SECRET: change-me-to-a-long-random-production-secret
      OPENROUTER_API_KEY: ''
      OPENROUTER_MODEL: qwen/qwen3-vl-235b-a22b-thinking
      OPENROUTER_REFERER: http://localhost:3000
      OPENROUTER_TITLE: Student Support Portal
    ports:
      - '3000:3000'

volumes:
  postgres_data:
